<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metallic Core Control Panel</title>
    <style>
        body {
            background: linear-gradient(135deg, #1f1f2e 0%, #111116 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .panel {
            background: linear-gradient(145deg, #2d2d3a, #1a1a24);
            border: 1px solid #4a4a5a;
            border-radius: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.7);
            padding: 30px;
            width: 500px;
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 10px;
            color: #94a3b8;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .metric-card {
            background: #16161f;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            background: #065f46;
            color: #34d399;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.3);
        }
        .btn-refresh {
            background: linear-gradient(180deg, #4b5563 0%, #374151 100%);
            border: 1px solid #4b5563;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-refresh:hover {
            background: linear-gradient(180deg, #374151 0%, #1f2937 100%);
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Metallic Cluster Monitor</h1>
        <div id="metrics-container">
            <p>Querying telemetry data...</p>
        </div>
        <button class="btn-refresh" onclick="fetchMetrics()">Poll Network Status</button>
    </div>

    <script>
        const BACKEND_URL = window.location.protocol + "//" + window.location.hostname + ":8080/api/status";

        async function fetchMetrics() {
            const container = document.getElementById('metrics-container');
            try {
                const response = await fetch(BACKEND_URL);
                const data = await response.json();
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="metric-card">
                            <span>${item.componentName}</span>
                            <span class="status-badge">${item.status}</span>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = `<p style="color: #ef4444;">Connection failed. Check backend cluster deployment routing.</p>`;
            }
        }
        window.onload = fetchMetrics;
    </script>
</body>
</html>
